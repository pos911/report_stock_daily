name: Monthly Calendar Sync Policy

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  monthly-policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "from src.utils.report_universe import PIPELINE_FREQUENCIES; print(PIPELINE_FREQUENCIES['monthly'])"
