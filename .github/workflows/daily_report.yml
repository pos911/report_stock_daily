name: Daily Quant Report Automation

on:
  schedule:
    # UTC 22:00 (KST 07:00), 01:30 (KST 10:30), 05:30 (KST 14:30)
    - cron: '0 22 * * *'
    - cron: '30 1 * * *'
    - cron: '30 5 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Inject API Keys and Run Script
      env:
        API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}
      run: |
        # Parse nested OR top-level keys
        export SUPABASE_URL=$(echo $API_KEYS_JSON | jq -r 'if .supabase.url then .supabase.url else .supabase_url // empty end')
        export SUPABASE_KEY=$(echo $API_KEYS_JSON | jq -r 'if .supabase.service_role_key then .supabase.service_role_key else .supabase_key // empty end')
        export GEMINI_API_KEY=$(echo $API_KEYS_JSON | jq -r 'if .gemini_api_key then .gemini_api_key else .GEMINI_API_KEY // empty end')
        
        python src/jobs/generate_report.py

    - name: Commit and Push Report
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/*.md
        git commit -m "Auto-generated daily quant report [skip ci]" || echo "No changes to commit"
        git push
