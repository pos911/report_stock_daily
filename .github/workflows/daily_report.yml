              "GEMINI_API_KEY":      pick(config.get("gemini",{}).get("api_key"), config.get("gemini_api_key"), config.get("GEMINI_API_KEY")),
              "TELEGRAM_BOT_TOKEN":  pick(config.get("telegram",{}).get("bot_token"), config.get("telegram_bot_token"), config.get("TELEGRAM_BOT_TOKEN")),
              "TELEGRAM_CHAT_ID":    pick(config.get("telegram",{}).get("chat_id"), config.get("telegram_chat_id"), config.get("TELEGRAM_CHAT_ID")),
              "GOOGLE_DOCS_NEWS_URL":pick(config.get("google_docs",{}).get("news_url"), config.get("google_docs_news_url"), config.get("GOOGLE_DOCS_NEWS_URL")),
          }
          required = ("SUPABASE_URL", "SUPABASE_KEY", "GEMINI_API_KEY")
          missing = [k for k in required if not env_map.get(k)]
          if missing:
              raise RuntimeError(f"Missing required keys: {', '.join(missing)}")
          with open(".runtime_env", "w") as f:
              for k, v in env_map.items():
                  if v:
                      if k in {"SUPABASE_KEY","GEMINI_API_KEY","TELEGRAM_BOT_TOKEN","TELEGRAM_CHAT_ID"}:
                          print(f"::add-mask::{v}")
                      escaped = str(v).replace("\\","\\\\").replace('"','\\"')
                      f.write(f'export {k}="{escaped}"\n')
          PY

          source .runtime_env
          python src/jobs/generate_report.py --type closing
          rm -f .runtime_env

      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/*.md
          git commit -m "Auto-generated closing quant report [skip ci]" || echo "No changes to commit"
          git push

  regular-report:
    name: Regular Report (10:30 / 12:30 / 14:30 KST)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && contains(github.event.schedule, '30 1,3,5')) ||
      github.event_name == 'workflow_dispatch'
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Inject API Keys & Run Regular Report
        env:
          API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}
          REPORT_TYPE: ${{ github.event.inputs.report_type || 'regular' }}
        run: |
          python - <<'PY'
          import json, os
          raw = os.getenv("API_KEYS_JSON", "")
          if not raw:
              raise RuntimeError("API_KEYS_JSON secret is empty.")
          config = json.loads(raw)
          def pick(*vals):
              return next((v for v in vals if v), "")
          env_map = {
              "SUPABASE_URL":        pick(config.get("supabase",{}).get("url"), config.get("supabase_url")),
              "SUPABASE_KEY":        pick(config.get("supabase",{}).get("service_role_key"), config.get("supabase_key")),
              "GEMINI_API_KEY":      pick(config.get("gemini",{}).get("api_key"), config.get("gemini_api_key"), config.get("GEMINI_API_KEY")),
              "TELEGRAM_BOT_TOKEN":  pick(config.get("telegram",{}).get("bot_token"), config.get("telegram_bot_token"), config.get("TELEGRAM_BOT_TOKEN")),
              "TELEGRAM_CHAT_ID":    pick(config.get("telegram",{}).get("chat_id"), config.get("telegram_chat_id"), config.get("TELEGRAM_CHAT_ID")),
              "GOOGLE_DOCS_NEWS_URL":pick(config.get("google_docs",{}).get("news_url"), config.get("google_docs_news_url"), config.get("GOOGLE_DOCS_NEWS_URL")),
          }
          required = ("SUPABASE_URL", "SUPABASE_KEY", "GEMINI_API_KEY")
          missing = [k for k in required if not env_map.get(k)]
          if missing:
              raise RuntimeError(f"Missing required keys: {', '.join(missing)}")
          with open(".runtime_env", "w") as f:
              for k, v in env_map.items():
                  if v:
                      if k in {"SUPABASE_KEY","GEMINI_API_KEY","TELEGRAM_BOT_TOKEN","TELEGRAM_CHAT_ID"}:
                          print(f"::add-mask::{v}")
                      escaped = str(v).replace("\\","\\\\").replace('"','\\"')
                      f.write(f'export {k}="{escaped}"\n')
          PY

          source .runtime_env
          python src/jobs/generate_report.py --type ${REPORT_TYPE}
          rm -f .runtime_env

      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/*.md
          git commit -m "Auto-generated ${{ env.REPORT_TYPE }} quant report [skip ci]" || echo "No changes to commit"
          git push
