name: Daily Quant Report Automation

on:
  schedule:
    # UTC 22:00 (KST 07:00), 01:30 (KST 10:30), 05:30 (KST 14:30)
    - cron: '0 22 * * *'
    - cron: '30 1 * * *'
    - cron: '30 5 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Inject API Keys and Run Script
      env:
        API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}
      run: |
        python - <<'PY'
        import json
        import os

        raw = os.getenv("API_KEYS_JSON", "")
        if not raw:
            raise RuntimeError("API_KEYS_JSON secret is empty.")

        config = json.loads(raw)

        def pick(*values):
            for value in values:
                if value:
                    return value
            return ""

        env_map = {
            "SUPABASE_URL": pick(config.get("supabase", {}).get("url"), config.get("supabase_url")),
            "SUPABASE_KEY": pick(config.get("supabase", {}).get("service_role_key"), config.get("supabase_key")),
            "GEMINI_API_KEY": pick(config.get("gemini", {}).get("api_key"), config.get("gemini_api_key"), config.get("GEMINI_API_KEY")),
            "TELEGRAM_BOT_TOKEN": pick(config.get("telegram", {}).get("bot_token"), config.get("telegram_bot_token"), config.get("TELEGRAM_BOT_TOKEN")),
            "TELEGRAM_CHAT_ID": pick(config.get("telegram", {}).get("chat_id"), config.get("telegram_chat_id"), config.get("TELEGRAM_CHAT_ID")),
            "GOOGLE_DOCS_NEWS_URL": pick(config.get("google_docs", {}).get("news_url"), config.get("google_docs_news_url"), config.get("GOOGLE_DOCS_NEWS_URL")),
        }

        required = ("SUPABASE_URL", "SUPABASE_KEY", "GEMINI_API_KEY")
        missing = [key for key in required if not env_map.get(key)]
        if missing:
            raise RuntimeError(f"Missing required keys in API_KEYS_JSON: {', '.join(missing)}")

        github_env = os.environ["GITHUB_ENV"]
        with open(github_env, "a", encoding="utf-8") as f:
            for key, value in env_map.items():
                if value:
                    f.write(f"{key}={value}\n")
        PY

        python src/jobs/generate_report.py

    - name: Commit and Push Report
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/*.md
        git commit -m "Auto-generated daily quant report [skip ci]" || echo "No changes to commit"
        git push
