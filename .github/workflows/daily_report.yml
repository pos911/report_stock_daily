          git push

  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  # Regular Report ??11:00 / 13:30 / 14:30 KST (UTC 02:00 / 04:30 / 05:30)
  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  regular-report:
    name: Regular Report (11:00 / 13:30 / 14:30 KST)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && (
        contains(github.event.schedule, '0 2') ||
        contains(github.event.schedule, '30 4') ||
        contains(github.event.schedule, '30 5')
      )) || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v3

