name: Daily Quant Report Automation

on:
  schedule:
    # ?А?А KST ??UTC ы│А??(KST = UTC+9) ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
    # 07:00 KST = 22:00 UTC (?ДьЭ╝)  ??Morning Report
    # KST ??ъ╕??дьаД ?дэЦЙ??ызЮь╢Ф?дый┤ UTC ??ык??А?БьЧР ?МьХД????    - cron: '0 22 * * 0-4'
    # 11:00 KST = 02:00 UTC         ??Regular Report
    - cron: '0 2 * * 1-5'
    # 13:30 KST = 04:30 UTC         ??Regular Report
    - cron: '30 4 * * 1-5'
    # 14:30 KST = 05:30 UTC         ??Regular Report
    - cron: '30 5 * * 1-5'
    # 15:30 KST = 06:30 UTC         ??Closing Report
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'ыжмэПм???аэШХ (morning / closing / regular)'
        required: false
        default: 'regular'

permissions:
  contents: write

jobs:
  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  # Morning Report ??07:00 KST (UTC 22:00 ?ДьЭ╝)
  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  morning-report:
    name: Morning Report (07:00 KST)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && contains(github.event.schedule, '0 22')

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply schema migrations if present
        run: |
          if [ -f scripts/apply_schema_migrations.py ]; then
            python scripts/apply_schema_migrations.py
          else
            echo "scripts/apply_schema_migrations.py not found; skipping schema migration."
          fi

      - name: Inject API Keys & Run Morning Report
        env:
          API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}
        run: |
          python - <<'PY'
          import json, os
          raw = os.getenv("API_KEYS_JSON", "")
          if not raw:
              raise RuntimeError("API_KEYS_JSON secret is empty.")
          config = json.loads(raw)
          def pick(*vals):
              return next((v for v in vals if v), "")
          env_map = {
              "SUPABASE_URL":        pick(config.get("supabase",{}).get("url"), config.get("supabase_url")),
              "SUPABASE_KEY":        pick(config.get("supabase",{}).get("service_role_key"), config.get("supabase_key")),
              "GEMINI_API_KEY":      pick(config.get("gemini",{}).get("api_key"), config.get("gemini_api_key"), config.get("GEMINI_API_KEY")),
              "TELEGRAM_BOT_TOKEN":  pick(config.get("telegram",{}).get("bot_token"), config.get("telegram_bot_token"), config.get("TELEGRAM_BOT_TOKEN")),
              "TELEGRAM_CHAT_ID":    pick(config.get("telegram",{}).get("chat_id"), config.get("telegram_chat_id"), config.get("TELEGRAM_CHAT_ID")),
              "GOOGLE_DOCS_NEWS_URL":pick(config.get("google_docs",{}).get("news_url"), config.get("google_docs_news_url"), config.get("GOOGLE_DOCS_NEWS_URL")),
          }
          required = ("SUPABASE_URL", "SUPABASE_KEY", "GEMINI_API_KEY")
          missing = [k for k in required if not env_map.get(k)]
          if missing:
              raise RuntimeError(f"Missing required keys: {', '.join(missing)}")
          with open(".runtime_env", "w") as f:
              for k, v in env_map.items():
                  if v:
                      if k in {"SUPABASE_KEY","GEMINI_API_KEY","TELEGRAM_BOT_TOKEN","TELEGRAM_CHAT_ID"}:
                          print(f"::add-mask::{v}")
                      escaped = str(v).replace("\\","\\\\").replace('"','\\"')
                      f.write(f'export {k}="{escaped}"\n')
          PY

          source .runtime_env
          python src/jobs/generate_report.py --type morning
          rm -f .runtime_env

      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/*.md
          git commit -m "Auto-generated morning quant report [skip ci]" || echo "No changes to commit"
          git push

  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
