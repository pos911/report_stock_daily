name: Weekly Cleanup

on:
  schedule:
    - cron: "30 23 * * 6"
  workflow_dispatch:

jobs:
  cleanup-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Inject runtime secrets
        env:
          API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}
        run: |
          python - <<'PY'
          import json, os
          payload = json.loads(os.environ["API_KEYS_JSON"])
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"SUPABASE_URL={payload['supabase']['url']}\n")
              env_file.write(f"SUPABASE_SERVICE_ROLE_KEY={payload['supabase']['service_role_key']}\n")
          PY
      - run: python scripts/cleanup_raw_tables.py
