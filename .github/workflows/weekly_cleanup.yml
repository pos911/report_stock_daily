name: Weekly Cleanup Manual

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cleanup in dry-run mode"
        required: false
        default: "true"

jobs:
  cleanup-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Prepare runtime secrets
        env:
          API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}
        run: |
          python - <<'PY'
          import json, os
          raw = os.getenv("API_KEYS_JSON", "")
          if not raw:
              raise RuntimeError("API_KEYS_JSON secret is empty.")
          payload = json.loads(raw)
          env_map = {
              "SUPABASE_URL": payload["supabase"]["url"],
              "SUPABASE_SERVICE_ROLE_KEY": payload["supabase"]["service_role_key"],
              "SUPABASE_KEY": payload["supabase"]["service_role_key"],
          }
          for key in ("SUPABASE_SERVICE_ROLE_KEY", "SUPABASE_KEY"):
              value = env_map.get(key)
              if value:
                  print(f"::add-mask::{value}")
          with open(".runtime_env", "w", encoding="utf-8") as handle:
              for key, value in env_map.items():
                  if value:
                      escaped = str(value).replace("\\", "\\\\").replace('"', '\\"')
                      handle.write(f'export {key}="{escaped}"\n')
          PY
      - name: Cleanup raw tables
        shell: bash
        run: |
          source .runtime_env
          if [[ "${{ github.event.inputs.dry_run || 'true' }}" == "true" ]]; then
            python scripts/cleanup_raw_tables.py --dry-run
          else
            python scripts/cleanup_raw_tables.py
          fi
      - name: Cleanup runtime secrets
        if: always()
        run: rm -f .runtime_env
