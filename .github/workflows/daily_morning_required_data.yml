name: Daily Morning Required Data

on:
  schedule:
    - cron: "35 21 * * 0-4"
  workflow_dispatch:
    inputs:
      verify_date:
        description: "YYYY-MM-DD optional"
        required: false
        default: ""

jobs:
  verify-morning-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Prepare runtime secrets
        env:
          API_KEYS_JSON: ${{ secrets.API_KEYS_JSON }}
        run: |
          python - <<'PY'
          import json, os
          raw = os.getenv("API_KEYS_JSON", "")
          if not raw:
              raise RuntimeError("API_KEYS_JSON secret is empty.")
          payload = json.loads(raw)
          env_map = {
              "SUPABASE_URL": payload["supabase"]["url"],
              "SUPABASE_SERVICE_ROLE_KEY": payload["supabase"]["service_role_key"],
              "SUPABASE_KEY": payload["supabase"]["service_role_key"],
              "KIS_APP_KEY": payload.get("kis", {}).get("app_key", ""),
              "KIS_APP_SECRET": payload.get("kis", {}).get("app_secret", ""),
              "KIS_ACCESS_TOKEN": payload.get("kis", {}).get("access_token", ""),
          }
          for key in ("SUPABASE_SERVICE_ROLE_KEY", "SUPABASE_KEY", "KIS_APP_KEY", "KIS_APP_SECRET", "KIS_ACCESS_TOKEN"):
              value = env_map.get(key)
              if value:
                  print(f"::add-mask::{value}")
          with open(".runtime_env", "w", encoding="utf-8") as handle:
              for key, value in env_map.items():
                  if value:
                      escaped = str(value).replace("\\", "\\\\").replace('"', '\\"')
                      handle.write(f'export {key}="{escaped}"\n')
          PY
      - name: Verify morning required data
        shell: bash
        run: |
          source .runtime_env
          if [[ -n "${{ github.event.inputs.verify_date }}" ]]; then
            python scripts/verify_data.py --date "${{ github.event.inputs.verify_date }}"
          else
            python scripts/verify_data.py
          fi
      - name: Cleanup runtime secrets
        if: always()
        run: rm -f .runtime_env
